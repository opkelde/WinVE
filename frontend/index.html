<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinVE Desktop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            pointer-events: none; /* Make click-through in the webview context */
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: transparent;
            pointer-events: none;
        }

        /* Siri rotating conic gradient border properties */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        #outline, #outline-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-width 0.08s ease-out, 
                        filter 0.08s ease-out;
            z-index: 10;
        }

        #outline {
            border: var(--border-width, 4px) solid transparent;
        }

        #outline-glow {
            border: var(--glow-width, 15px) solid transparent;
            z-index: 9;
            filter: blur(var(--glow-blur, 15px));
        }

        /* Active animations */
        .active-border {
            opacity: 1 !important;
            animation: rotate-gradient 4s linear infinite;
        }

        @keyframes rotate-gradient {
            from {
                --angle: 0deg;
            }
            to {
                --angle: 360deg;
            }
        }

        /* State colors - HSL/neon palettes */
        body.state-listening, body.state-processing, body.state-responding, body.state-connecting {
            --color-1: #00d2ff;
            --color-2: #7a00ff;
            --color-3: #ff007f;
            --color-4: #00e5ff;
        }

        body.state-success {
            --color-1: #0076ff;
            --color-2: #00c6ff;
            --color-3: #0052ff;
            --color-4: #00e5ff;
        }

        body.state-error {
            --color-1: #ff453a;
            --color-2: #ff9f0a;
            --color-3: #ff3b30;
            --color-4: #ff453a;
        }

        .active-border#outline {
            border-image: conic-gradient(from var(--angle), var(--color-1), var(--color-2), var(--color-3), var(--color-4), var(--color-1)) 1;
        }

        .active-border#outline-glow {
            border-image: conic-gradient(from var(--angle), var(--color-1), var(--color-2), var(--color-3), var(--color-4), var(--color-1)) 1;
        }
        
        /* Glassmorphic card styling for texts centered at the bottom */
        .text-card {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
            pointer-events: none;
            z-index: 1000;
            display: none;
            max-width: 500px;
            min-width: 280px;
            line-height: 1.5;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 14px 24px;
            border-radius: 16px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #errorText {
            color: #ff453a;
            border: 1px solid rgba(255, 69, 58, 0.35);
            box-shadow: 0 8px 32px 0 rgba(255, 69, 58, 0.15), inset 0 0 12px rgba(255, 69, 58, 0.05);
            animation: pulse-error 1.5s infinite alternate ease-in-out;
        }
        
        #successText {
            color: #0a84ff;
            border: 1px solid rgba(10, 132, 255, 0.35);
            box-shadow: 0 8px 32px 0 rgba(10, 132, 255, 0.15), inset 0 0 12px rgba(10, 132, 255, 0.05);
        }
        
        #responseText {
            color: #ffffff;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            animation: slide-up 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse-error {
            from {
                opacity: 0.9;
                transform: translateX(-50%) scale(1);
            }
            to {
                opacity: 1.0;
                transform: translateX(-50%) scale(1.02);
            }
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="outline"></div>
        <div id="outline-glow"></div>
        <div id="errorText" class="text-card"></div>
        <div id="successText" class="text-card"></div>
        <div id="responseText" class="text-card"></div>
    </div>

    <script>
        let websocket = null;
        let currentState = 'hidden';
        let audioData = [];
        let isConnected = false;
        let errorMessage = '';
        let successMessage = '';
        let responseTextEnabled = true;
        let currentResponseText = '';
        
        // Audio normalization & reactivity settings
        let audioBuffer = [];
        const AUDIO_BUFFER_SIZE = 4;  // Smoothing buffer size
        let audioBaseline = 0.12;     // Minimum level for silence
        let audioMax = 0.45;           // Max level limiter
        let audioHistory = [];
        const HISTORY_SIZE = 100;
        
        function showErrorText(message) {
            const errorElement = document.getElementById('errorText');
            if (errorElement && message) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
        }
        
        function hideErrorText() {
            const errorElement = document.getElementById('errorText');
            if (errorElement) {
                errorElement.style.display = 'none';
            }
        }
        
        function showSuccessText(message, color = '#0a84ff') {
            const successElement = document.getElementById('successText');
            if (successElement && message) {
                successElement.textContent = message;
                successElement.style.color = color;
                successElement.style.borderColor = color + '55';
                successElement.style.display = 'block';
            }
        }
        
        function hideSuccessText() {
            const successElement = document.getElementById('successText');
            if (successElement) {
                successElement.style.display = 'none';
            }
        }
        
        function showResponseText(text) {
            if (!responseTextEnabled || !text) return;
            const responseElement = document.getElementById('responseText');
            if (responseElement) {
                responseElement.textContent = text;
                responseElement.style.display = 'block';
                currentResponseText = text;
            }
        }
        
        function hideResponseText() {
            const responseElement = document.getElementById('responseText');
            if (responseElement) {
                responseElement.style.display = 'none';
                currentResponseText = '';
            }
        }
        
        function normalizeAudioLevel(rawLevel) {
            const cappedLevel = Math.min(rawLevel, audioMax);
            const range = audioMax - audioBaseline;
            if (range <= 0) return 0;
            if (cappedLevel < audioBaseline) {
                return Math.max(0, (cappedLevel / audioBaseline) * 0.08);
            }
            return 0.08 + 0.92 * (cappedLevel - audioBaseline) / range;
        }
        
        function processAudioLevel(fftData) {
            if (!fftData || fftData.length === 0) return 0;
            
            // Calculate weighted average focusing on voice frequency bins
            let avgLevel = 0;
            let count = 0;
            const relevantRange = Math.min(fftData.length, 18);
            
            for (let i = 0; i < relevantRange; i++) {
                const weight = (relevantRange - i) / relevantRange;
                avgLevel += fftData[i] * weight;
                count += weight;
            }
            
            if (count <= 0) return 0;
            const rawLevel = avgLevel / count;
            
            // Adapt thresholds dynamically to environment noise
            audioHistory.push(rawLevel);
            if (audioHistory.length > HISTORY_SIZE) {
                audioHistory.shift();
            }
            
            if (audioHistory.length > 15) {
                const sortedHistory = [...audioHistory].sort((a, b) => a - b);
                const baselineIndex = Math.floor(sortedHistory.length * 0.15);
                const maxIndex = Math.floor(sortedHistory.length * 0.92);
                
                audioBaseline = audioBaseline * 0.95 + sortedHistory[baselineIndex] * 0.05;
                audioMax = audioMax * 0.95 + sortedHistory[maxIndex] * 0.05;
                
                audioBaseline = Math.max(0.04, audioBaseline);
                audioMax = Math.max(audioBaseline * 1.6, audioMax);
            }
            
            const normalizedLevel = normalizeAudioLevel(rawLevel);
            
            audioBuffer.push(normalizedLevel);
            if (audioBuffer.length > AUDIO_BUFFER_SIZE) {
                audioBuffer.shift();
            }
            
            return audioBuffer.reduce((sum, val) => sum + val, 0) / audioBuffer.length;
        }
        
        function updateAudioReactivity() {
            // Only update reactive properties if in state that listens/responds to voice
            if (currentState !== 'listening' && currentState !== 'responding') {
                return;
            }
            
            const smoothedLevel = processAudioLevel(audioData);
            
            // Dynamic border width: 4px to 14px
            const borderWidth = 4 + smoothedLevel * 10;
            // Dynamic glow width: 15px to 40px
            const glowWidth = 15 + smoothedLevel * 25;
            // Dynamic glow blur: 15px to 30px
            const glowBlur = 15 + smoothedLevel * 15;
            // Dynamic opacity: 0.35 to 1.0
            const glowOpacity = 0.35 + smoothedLevel * 0.65;
            
            const outline = document.getElementById('outline');
            const glow = document.getElementById('outline-glow');
            
            if (outline && glow) {
                outline.style.setProperty('--border-width', `${borderWidth}px`);
                glow.style.setProperty('--glow-width', `${glowWidth}px`);
                glow.style.setProperty('--glow-blur', `${glowBlur}px`);
                glow.style.opacity = glowOpacity;
            }
        }
        
        function changeState(newState, data = {}) {
            if (currentState === newState) return;
            console.log(`State change: ${currentState} -> ${newState}`);
            
            const outline = document.getElementById('outline');
            const glow = document.getElementById('outline-glow');
            
            // Reset text states
            hideErrorText();
            hideSuccessText();
            if (newState === 'hidden') {
                hideResponseText();
            }
            
            // Reset dynamic styles for non-audio states
            if (outline && glow) {
                outline.style.removeProperty('--border-width');
                glow.style.removeProperty('--glow-width');
                glow.style.removeProperty('--glow-blur');
                glow.style.removeProperty('opacity');
            }
            
            // Update body class for CSS state styles
            document.body.className = 'state-' + newState;
            currentState = newState;
            
            if (newState === 'hidden') {
                if (outline) outline.classList.remove('active-border');
                if (glow) glow.classList.remove('active-border');
                return;
            }
            
            // Enable visualizer borders
            if (outline) outline.classList.add('active-border');
            if (glow) glow.classList.add('active-border');
            
            // Extract custom data
            if (newState === 'error' && data.errorMessage) {
                errorMessage = data.errorMessage;
                showErrorText(errorMessage);
            } else if (newState === 'success') {
                successMessage = data.successMessage || 'Success';
                showSuccessText(successMessage, '#0a84ff'); // Vibrant Blue/Cyan
            } else if (newState === 'connecting') {
                successMessage = data.successMessage || 'Connecting...';
                showSuccessText(successMessage, '#ffeb3b');
            }
        }
        
        function initWebSocket() {
            try {
                websocket = new WebSocket('ws://localhost:8765');
                
                websocket.onopen = function(event) {
                    console.log('Connected to animation server');
                    isConnected = true;
                    websocket.send(JSON.stringify({ type: 'ready' }));
                };
                
                websocket.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    switch(data.type) {
                        case 'state_change':
                            changeState(data.state, data);
                            break;
                        case 'audio_data':
                            audioData = data.fft || [];
                            updateAudioReactivity();
                            break;
                        case 'response_text':
                            if (responseTextEnabled) {
                                showResponseText(data.text);
                            }
                            break;
                    }
                };
                
                websocket.onclose = function(event) {
                    console.log('Animation server connection closed');
                    isConnected = false;
                    setTimeout(initWebSocket, 2000);
                };
                
                websocket.onerror = function(error) {
                    console.error('WebSocket error:', error);
                };
                
            } catch (error) {
                console.error('WebSocket initialization error:', error);
                setTimeout(initWebSocket, 2000);
            }
        }
        
        function startHeartbeat() {
            setInterval(() => {
                if (websocket && websocket.readyState === WebSocket.OPEN) {
                    websocket.send(JSON.stringify({ type: 'ping' }));
                }
            }, 30000);
        }
        
        window.addEventListener('load', function() {
            console.log('WinVE interface initialized');
            initWebSocket();
            startHeartbeat();
        });
    </script>
</body>
</html>
